<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Donation Alert — AUMII</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./_overlay-base.css"/>
<style>
/* ─── Layout ─────────────────────────────── */
body { display:flex; align-items:flex-start; justify-content:center; width:100%; height:100%; }
#alertWrap { width:100%; padding:10px; pointer-events:none; }

/* ─── Card ───────────────────────────────── */
.alert-card {
  position:relative; background:var(--surface);
  border:1px solid var(--border-red); border-radius:var(--r-lg);
  padding:16px 18px; display:flex; align-items:center; gap:14px;
  backdrop-filter:blur(24px); overflow:hidden;
  transform:translateY(-60px) scale(0.88); opacity:0;
}
.alert-card.show { animation:slideInTop  0.55s var(--ease-spring) forwards; }
.alert-card.hide { animation:slideOutTop 0.40s var(--ease-out)    forwards; }

/* ─── Avatar ─────────────────────────────── */
.alert-avatar {
  width:52px; height:52px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--red),#ff6b6b);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:20px; color:#fff;
  position:relative;
}
/* spinning ring */
.alert-avatar::after {
  content:''; position:absolute; inset:-3px; border-radius:50%;
  border:2px solid transparent;
  background:conic-gradient(var(--red),transparent 50%,var(--red)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out; mask-composite:exclude;
  animation:spin 2s linear infinite;
}

/* ─── Text ───────────────────────────────── */
.alert-text { flex:1; min-width:0; }
.alert-badge {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--red-dim); border:1px solid var(--border-red);
  border-radius:var(--r-full); padding:2px 9px;
  font-size:10px; font-weight:600; color:#FF6B6B;
  text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px;
}
.alert-badge::before { content:'♥'; font-size:9px; }
.alert-donor {
  font-family:var(--font-display); font-size:22px; letter-spacing:.04em;
  color:#fff; line-height:1; margin-bottom:2px;
  text-shadow:0 0 20px rgba(255,45,45,0.5);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.alert-msg { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ─── Amount ─────────────────────────────── */
.alert-amount {
  font-family:var(--font-display); font-size:30px; letter-spacing:.04em;
  color:var(--gold); text-shadow:0 0 30px var(--gold-glow);
  white-space:nowrap; flex-shrink:0;
  animation:amtPop 0.8s var(--ease-spring) 0.4s both;
}
@keyframes amtPop { 0%{transform:scale(0.5) rotate(-8deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }

/* ─── Drain bar ──────────────────────────── */
.progress-bar {
  position:absolute; bottom:0; left:0; right:0; height:3px;
  background:rgba(255,255,255,0.06); border-radius:0 0 var(--r-lg) var(--r-lg); overflow:hidden;
}
.progress-fill {
  height:100%; width:100%; transform-origin:left;
  background:linear-gradient(90deg,var(--red),var(--gold));
  animation:drain 11s linear 0.8s forwards;
}
@keyframes drain { to{transform:scaleX(0)} }

/* ─── Particles canvas ───────────────────── */
#pCanvas { position:absolute; inset:0; pointer-events:none; border-radius:var(--r-lg); }

/* ─── Hearts ─────────────────────────────── */
.heart { position:absolute; font-size:16px; animation:floatHeart 2s ease-out forwards; pointer-events:none; }
@keyframes floatHeart { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-80px) scale(0.5);opacity:0} }

/* ─── TTS pill ───────────────────────────── */
#ttsWrap { text-align:center; margin-top:8px; display:none; }
.tts-pill {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--surface); border:1px solid var(--border-gold);
  border-radius:var(--r-full); padding:6px 14px;
  font-family:var(--font-body); font-size:12px; color:var(--muted);
}
.tts-dot { width:7px; height:7px; border-radius:50%; background:var(--gold); animation:dotBlink 1s ease-in-out infinite; }
@keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:.2} }
</style>
</head>
<body>

<div id="alertWrap">
  <div class="alert-card card-glow-edge card-shimmer" id="alertCard">
    <canvas id="pCanvas" width="460" height="90"></canvas>
    <div class="alert-avatar" id="alertAvatar">?</div>
    <div class="alert-text">
      <div class="alert-badge">New Donation</div>
      <div class="alert-donor" id="alertDonor">Donor Name</div>
      <div class="alert-msg"  id="alertMsg"></div>
    </div>
    <div class="alert-amount" id="alertAmt">₹99</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div id="ttsWrap"><div class="tts-pill"><div class="tts-dot"></div> Reading aloud...</div></div>
</div>

<div class="ws-status" id="wsStatus" title="WebSocket status"></div>

<script>
/* ══════ CONFIG ══════════════════════════════════════════ */
const WS_URL         = 'wss://tips-production.up.railway.app/ws';
const ALERT_DURATION = 12000;   // ms card stays on screen
const TTS_ENABLED    = true;
const TTS_VOICE_LANG = 'hi-IN';
const TTS_RATE       = 0.95;
const TTS_PITCH      = 1.1;
const TTS_VOLUME     = 1.0;
/* ═══════════════════════════════════════════════════════ */

// ─── Queue ─────────────────────────────────────────────
let alertQueue = [], isShowing = false;
const synth = window.speechSynthesis;
let voices = [];
const wsStatus = document.getElementById('wsStatus');

// ─── Audio unlock (required by OBS Chromium) ──────────
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return; audioUnlocked = true;
  try { const ac = new (window.AudioContext || window.webkitAudioContext)(); const b = ac.createBuffer(1,1,22050); const s = ac.createBufferSource(); s.buffer = b; s.connect(ac.destination); s.start(0); } catch(e){}
  voices = synth.getVoices();
}
document.addEventListener('click', unlockAudio, { once: true });
setTimeout(unlockAudio, 2500);
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => { voices = synth.getVoices(); };

// ─── WebSocket (auto-reconnect) ────────────────────────
function connect() {
  const ws = new WebSocket(WS_URL);
  ws.onopen    = () => { wsStatus.className = 'ws-status ok'; console.log('[alert] ✅ WS connected'); };
  ws.onmessage = (e) => { try { const d = JSON.parse(e.data); if (d.type === 'donation') enqueue(d); if (d.type === 'settings_update') applySettings(d); } catch(_){} };
  ws.onclose   = () => { wsStatus.className = 'ws-status err'; setTimeout(connect, 3000); };
  ws.onerror   = () => {};
}
connect();

function applySettings(d) {
  // handled server-side; overlay uses init payload
}

// ─── Queue ─────────────────────────────────────────────
function enqueue(data) { alertQueue.push(data); if (!isShowing) dequeue(); }
function dequeue()     { if (isShowing || !alertQueue.length) return; isShowing = true; showAlert(alertQueue.shift()); }

// ─── Show alert ────────────────────────────────────────
function showAlert(data) {
  const card = document.getElementById('alertCard');
  const init = data.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';
  document.getElementById('alertAvatar').textContent = init;
  document.getElementById('alertDonor').textContent  = data.name;
  document.getElementById('alertMsg').textContent    = data.message ? `"${data.message}"` : '';
  document.getElementById('alertAmt').textContent    = `₹${data.amount}`;

  const pf = document.getElementById('progressFill');
  pf.style.animation = 'none'; void pf.offsetWidth; pf.style.animation = 'drain 11s linear 0.8s forwards';

  card.classList.remove('hide'); card.classList.add('show');
  spawnParticles(); spawnHearts();

  let hidden = false;
  const start = Date.now();

  function hide() {
    if (hidden) return; hidden = true; synth.cancel();
    card.classList.remove('show'); card.classList.add('hide');
    document.getElementById('ttsWrap').style.display = 'none';
    setTimeout(() => { card.classList.remove('hide'); isShowing = false; dequeue(); }, 450);
  }

  setTimeout(() => {
    speakTTS(data, () => {
      const rem = Math.max(0, ALERT_DURATION - (Date.now() - start));
      setTimeout(hide, rem + 400);
    });
  }, 800);

  setTimeout(hide, ALERT_DURATION + 28000); // hard safety timeout
}

// ─── TTS ───────────────────────────────────────────────
function speakTTS(data, onDone) {
  if (!TTS_ENABLED) { onDone(); return; }
  synth.cancel();
  const text  = data.message ? `${data.name} donated ₹${data.amount} and says: ${data.message}` : `${data.name} donated ₹${data.amount}! Thank you!`;
  const clean = text.replace(/[^\p{L}\p{N}\p{P}\s]/gu, '').trim();
  if (!clean) { onDone(); return; }
  document.getElementById('ttsWrap').style.display = 'block';
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang   = TTS_VOICE_LANG; utter.rate = TTS_RATE; utter.pitch = TTS_PITCH; utter.volume = TTS_VOLUME;
  const v = voices.find(v => v.lang === TTS_VOICE_LANG) || voices[0];
  if (v) utter.voice = v;
  let done = false;
  const guard = setTimeout(() => { if(!done){done=true; onDone();} }, (clean.length / 12) * 1000 + 5000);
  utter.onend  = utter.onerror = () => { if(!done){done=true; clearTimeout(guard); onDone();} };
  synth.speak(utter);
  // Keep-alive for long TTS (OBS Chromium pauses synthesis)
  const ka = setInterval(() => { if(!synth.speaking){clearInterval(ka);} else {synth.pause();synth.resume();} }, 8000);
}

// ─── Particles ─────────────────────────────────────────
const pCanvas = document.getElementById('pCanvas'), pCtx = pCanvas.getContext('2d');
let pts = [];
function spawnParticles() {
  pts = Array.from({ length: 50 }, () => ({
    x:40+Math.random()*40, y:45+Math.random()*20,
    vx:(Math.random()-.5)*5, vy:(Math.random()-.5)*5,
    r:1+Math.random()*3, alpha:1, color:Math.random()>.5?'#FF2D2D':'#FFD700'
  }));
  animPts();
}
function animPts() {
  pCtx.clearRect(0,0,460,90);
  pts = pts.filter(p => p.alpha > 0.02);
  pts.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.alpha-=0.024;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pCtx.fillStyle=p.color; pCtx.globalAlpha=p.alpha; pCtx.fill();
  });
  pCtx.globalAlpha=1;
  if (pts.length) requestAnimationFrame(animPts); else pCtx.clearRect(0,0,460,90);
}

// ─── Floating hearts ───────────────────────────────────
function spawnHearts() {
  const wrap = document.getElementById('alertWrap'), emojis = ['❤️','💛','🔥','⭐','💎'];
  for (let i = 0; i < 8; i++) setTimeout(() => {
    const h = document.createElement('div'); h.className = 'heart';
    h.textContent = emojis[~~(Math.random()*emojis.length)];
    h.style.cssText = `left:${10+Math.random()*80}%;bottom:10px;animation-duration:${1.5+Math.random()}s;animation-delay:${Math.random()*0.5}s`;
    wrap.appendChild(h); h.addEventListener('animationend', () => h.remove());
  }, i * 100);
}
</script>
</body>
</html>
