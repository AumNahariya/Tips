<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Top Donation</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  #topPanel {
    width: 100%;
    padding: 10px;
    pointer-events: none;
  }

  .panel-header {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px;
  }
  .crown-icon { font-size: 16px; animation: crownBob 2s ease-in-out infinite; }
  @keyframes crownBob {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-3px) rotate(5deg); }
  }
  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.5); white-space: nowrap;
  }
  .panel-title span { color: #FFD700; }
  .panel-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(255,215,0,0.4), transparent);
  }

  #topCard {
    background: rgba(8,8,16,0.88);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 12px 14px;
    backdrop-filter: blur(20px);
    position: relative; overflow: hidden;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.5s, transform 0.5s;
  }
  #topCard.visible { opacity: 1; transform: translateY(0); }

  #topCard::before {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, #FFD700, transparent);
    animation: goldGlow 3s ease-in-out infinite;
  }
  @keyframes goldGlow {
    0%,100% { opacity:0.4; left:20%; right:20%; }
    50%      { opacity:1;   left:5%;  right:5%; }
  }
  #topCard::after {
    content: '';
    position: absolute; top:0; left:-80%; width:60%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.05), transparent);
    animation: sweep 4s ease-in-out infinite;
  }
  @keyframes sweep { to { left: 130%; } }

  .top-inner {
    display: flex; align-items: center; gap: 10px;
    position: relative; z-index: 1;
  }
  .top-avatar {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: #000;
    position: relative; box-shadow: 0 0 16px rgba(255,215,0,0.4);
  }
  .top-avatar::after {
    content: '';
    position: absolute; inset: -3px; border-radius: 50%;
    border: 2px solid transparent;
    background: conic-gradient(#FFD700, transparent 50%, #FFD700) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out; mask-composite: exclude;
    animation: rotateBorder 2s linear infinite;
  }
  @keyframes rotateBorder { to { transform: rotate(360deg); } }

  .top-info { flex: 1; min-width: 0; }
  .top-label {
    font-size: 10px; color: rgba(255,255,255,0.35);
    text-transform: uppercase; letter-spacing: 0.08em;
    font-family: 'DM Sans', sans-serif;
  }
  .top-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 0.04em; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 0 12px rgba(255,215,0,0.3);
  }
  .top-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 0.04em; color: #FFD700;
    text-shadow: 0 0 20px rgba(255,215,0,0.8);
    flex-shrink: 0; white-space: nowrap;
  }

  @keyframes newRecord {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); }
    50%      { box-shadow: 0 0 0 10px rgba(255,215,0,0.2); }
  }
  #topCard.new-record { animation: newRecord 0.8s ease-in-out 4; border-color: rgba(255,215,0,0.8); }

  .empty-state {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; color: rgba(255,255,255,0.2);
    text-align: center; padding: 8px 0;
  }
</style>
</head>
<body>
<div id="topPanel">
  <div class="panel-header">
    <div class="crown-icon">👑</div>
    <div class="panel-title">TOP <span>SUPPORTER</span></div>
    <div class="panel-line"></div>
  </div>
  <div id="topCard">
    <div class="empty-state">Waiting for donations...</div>
  </div>
</div>

<script>
// Auto-detect WebSocket — works from any Railway URL path
const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
const SERVER_URL = proto + '//' + location.host + '/ws';

let topDonor = null;
let wsReady  = false;

function connect() {
  console.log('[topdono] connecting to', SERVER_URL);
  const ws = new WebSocket(SERVER_URL);

  ws.onopen = () => {
    wsReady = true;
    console.log('[topdono] WS connected');
  };

  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      console.log('[topdono] received:', d.type, d.name, d.amount);
      if (d.type === 'donation') checkTopDonor(d);
    } catch(err) { console.error('[topdono] parse error', err); }
  };

  ws.onclose = (e) => {
    wsReady = false;
    console.log('[topdono] WS closed, reconnecting in 3s...', e.code);
    setTimeout(connect, 3000);
  };

  ws.onerror = (e) => {
    console.error('[topdono] WS error:', e);
  };
}

connect();

function checkTopDonor(data) {
  const amt = parseFloat(data.amount);
  const isNew = !topDonor || amt > parseFloat(topDonor.amount);
  if (isNew) {
    topDonor = { name: data.name, amount: data.amount };
    renderTop(true);
  }
}

function renderTop(isNewRecord) {
  const card = document.getElementById('topCard');
  if (!topDonor) return;

  const initials = topDonor.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) || '?';

  // Fade out, update, fade in
  card.classList.remove('visible', 'new-record');
  void card.offsetWidth;

  setTimeout(() => {
    card.innerHTML = `
      <div class="top-inner">
        <div class="top-avatar">${initials}</div>
        <div class="top-info">
          <div class="top-label">Top Supporter 👑</div>
          <div class="top-name">${topDonor.name}</div>
        </div>
        <div class="top-amount">₹${topDonor.amount}</div>
      </div>`;
    card.classList.add('visible');
    if (isNewRecord) setTimeout(() => card.classList.add('new-record'), 100);
  }, 300);
}
</script>
</body>
</html>
