<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Donation Goal — AUMII</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./_overlay-base.css"/>
<style>
body { width:100%; height:100%; }
#panel { width:100%; padding:10px; pointer-events:none; }
.goal-card {
  background:var(--surface); border:1px solid var(--border-red);
  border-radius:var(--r-md); padding:12px 14px;
  backdrop-filter:blur(20px); position:relative; overflow:hidden;
}
.goal-card::before {
  content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background:linear-gradient(90deg,transparent,var(--red),transparent); opacity:.6;
}
.goal-header  { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.goal-title   { font-family:var(--font-display); font-size:14px; letter-spacing:.1em; color:var(--muted); }
.goal-amounts { font-family:var(--font-display); font-size:14px; color:#fff; letter-spacing:.04em; }
.goal-amounts em { color:var(--gold); font-style:normal; }
.bar-track  { height:10px; background:rgba(255,255,255,.07); border-radius:var(--r-full); overflow:hidden; position:relative; }
.bar-fill   {
  height:100%; width:0%; border-radius:var(--r-full); position:relative;
  background:linear-gradient(90deg,var(--red),var(--gold));
  transition:width 1.2s var(--ease-spring);
}
.bar-fill::after { content:''; position:absolute; top:0; right:0; bottom:0; width:18px; background:rgba(255,255,255,.3); filter:blur(4px); border-radius:var(--r-full); }
.goal-pct { font-family:var(--font-display); font-size:11px; color:var(--muted); text-align:center; margin-top:6px; letter-spacing:.06em; }
</style>
</head>
<body>
<div id="panel">
  <div class="goal-card card-glow-edge">
    <div class="goal-header">
      <div class="goal-title" id="goalTitle">STREAM GOAL 🎯</div>
      <div class="goal-amounts">₹<em id="curAmt">0</em> / ₹<em id="tgtAmt">5000</em></div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="goal-pct" id="goalPct">0% reached</div>
  </div>
</div>
<div class="ws-status" id="wsStatus"></div>

<script>
/*
  CUSTOMISE VIA OBS URL PARAMS — no code changes needed:
  /overlay/goal?goal=10000&title=Gaming+PC&start=2500
*/
const WS_URL  = 'wss://tips-production.up.railway.app/ws';
const params  = new URLSearchParams(location.search);
let goalAmt   = parseInt(params.get('goal'))  || 5000;
let goalTitle = params.get('title') || 'Stream Goal 🎯';
let current   = parseInt(params.get('start')) || 0;

document.getElementById('goalTitle').textContent = goalTitle.toUpperCase();
document.getElementById('tgtAmt').textContent    = goalAmt;
updateBar(current);

function updateBar(amt) {
  current = Math.max(0, amt);
  const pct = Math.min(100, Math.round((current / goalAmt) * 100));
  document.getElementById('curAmt').textContent  = current;
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('goalPct').textContent = pct + '% reached' + (pct >= 100 ? ' 🎉 Goal reached!' : '');
}

const wsStatus = document.getElementById('wsStatus');
function connect() {
  const ws = new WebSocket(WS_URL);
  ws.onopen    = () => { wsStatus.className = 'ws-status ok'; };
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'donation') updateBar(current + parseFloat(d.amount));
      if (d.type === 'init' && d.settings?.goal) {
        const g = d.settings.goal;
        if (g.currentTotal) updateBar(g.currentTotal);
        if (g.amount)       { goalAmt = g.amount; document.getElementById('tgtAmt').textContent = goalAmt; updateBar(current); }
        if (g.title)        { goalTitle = g.title; document.getElementById('goalTitle').textContent = goalTitle.toUpperCase(); }
      }
      if (d.type === 'settings_update' && d.section === 'goal') {
        if (d.key === 'currentTotal') updateBar(parseFloat(d.value));
        if (d.key === 'amount')  { goalAmt = parseFloat(d.value); document.getElementById('tgtAmt').textContent = goalAmt; updateBar(current); }
        if (d.key === 'title')   { goalTitle = d.value; document.getElementById('goalTitle').textContent = goalTitle.toUpperCase(); }
      }
    } catch(_){}
  };
  ws.onclose = () => { wsStatus.className = 'ws-status err'; setTimeout(connect, 3000); };
  ws.onerror  = () => {};
}
connect();
</script>
</body>
</html>
