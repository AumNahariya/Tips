<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Recent Donations</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    width: 1920px; height: 1080px;
    overflow: hidden; position: relative;
  }

  /* ── Panel — bottom right ── */
  #recentPanel {
    position: absolute;
    bottom: 40px; right: 40px;
    width: 320px;
    pointer-events: none;
  }

  .panel-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.5);
  }
  .panel-title span { color: #FF2D2D; }
  .panel-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(255,45,45,0.4), transparent);
  }

  /* ── Donation rows ── */
  #recentList { display: flex; flex-direction: column; gap: 6px; }

  .d-row {
    display: flex; align-items: center; gap: 10px;
    background: rgba(8,8,16,0.82);
    border: 1px solid rgba(255,255,255,0.07);
    border-left: 2px solid rgba(255,45,45,0.5);
    border-radius: 10px;
    padding: 8px 12px;
    backdrop-filter: blur(16px);
    animation: rowIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    position: relative; overflow: hidden;
  }
  .d-row::after {
    content: '';
    position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
    animation: rowShimmer 4s ease-in-out infinite;
  }
  @keyframes rowShimmer { to { left: 120%; } }

  .d-row.new-row { border-left-color: #FFD700; }
  .d-row.new-row .d-rank { color: #FFD700; }

  @keyframes rowIn {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes rowOut {
    from { transform: translateX(0);    opacity: 1; max-height: 60px; margin-bottom: 6px; }
    to   { transform: translateX(40px); opacity: 0; max-height: 0;    margin-bottom: 0; }
  }
  .d-row.leaving { animation: rowOut 0.35s ease forwards; }

  .d-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; color: rgba(255,45,45,0.7);
    min-width: 18px; text-align: center; flex-shrink: 0;
  }
  .d-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #FF2D2D, #ff6b6b);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 12px; color: #fff;
  }
  .d-info { flex: 1; min-width: 0; }
  .d-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .d-msg {
    font-size: 11px; color: rgba(255,255,255,0.4);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 170px;
  }
  .d-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; color: #FFD700;
    text-shadow: 0 0 12px rgba(255,215,0,0.5);
    flex-shrink: 0;
  }

  /* waiting state */
  .empty-state {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: rgba(255,255,255,0.2);
    text-align: center; padding: 12px 0;
  }
</style>
</head>
<body>

<div id="recentPanel">
  <div class="panel-header">
    <div class="panel-title">RECENT <span>DONATIONS</span></div>
    <div class="panel-line"></div>
  </div>
  <div id="recentList">
    <div class="empty-state">Waiting for donations...</div>
  </div>
</div>

<script>
const SERVER_URL = location.protocol === 'https:' ? 'wss://' + location.host : 'ws://' + location.host;

const MAX_ROWS   = 5;
let donations    = []; // array of { name, amount, message }

function connect() {
  const ws = new WebSocket(SERVER_URL);
  ws.onopen    = () => console.log('[recent] WS connected');
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'donation') addDonation(data);
    } catch(err) {}
  };
  ws.onclose = () => setTimeout(connect, 3000);
}
connect();

function addDonation(data) {
  donations.unshift({ name: data.name, amount: data.amount, message: data.message || '' });
  if (donations.length > MAX_ROWS) donations = donations.slice(0, MAX_ROWS);
  renderList(true);
}

function renderList(isNew) {
  const list = document.getElementById('recentList');

  // If first donation, remove empty state
  if (list.querySelector('.empty-state')) list.innerHTML = '';

  // Mark all existing rows as leaving
  if (isNew) {
    const existing = list.querySelectorAll('.d-row:not(.leaving)');
    existing.forEach(r => {
      r.classList.add('leaving');
      r.addEventListener('animationend', () => r.remove(), { once: true });
    });
  }

  // Rebuild from donations array
  setTimeout(() => {
    list.innerHTML = '';
    donations.forEach((d, i) => {
      const initials = d.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) || '?';
      const row      = document.createElement('div');
      row.className  = 'd-row' + (i === 0 && isNew ? ' new-row' : '');
      row.style.animationDelay = (i * 0.07) + 's';
      row.innerHTML  = `
        <div class="d-rank">#${i+1}</div>
        <div class="d-avatar">${initials}</div>
        <div class="d-info">
          <div class="d-name">${d.name}</div>
          ${d.message ? `<div class="d-msg">"${d.message}"</div>` : ''}
        </div>
        <div class="d-amount">₹${d.amount}</div>`;
      list.appendChild(row);
    });
  }, isNew ? 200 : 0);
}
</script>
</body>
</html>
