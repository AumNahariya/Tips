<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Recent Donations — AUMII</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./_overlay-base.css"/>
<style>
body { width:100%; height:100%; }
#panel { width:100%; padding:10px; pointer-events:none; }
.panel-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.panel-title  { font-family:var(--font-display); font-size:15px; letter-spacing:.1em; color:var(--muted); white-space:nowrap; }
.panel-title span { color:var(--red); }
.panel-line   { flex:1; height:1px; background:linear-gradient(90deg,var(--border-red),transparent); }

#sliderWindow { position:relative; overflow:hidden; border-radius:var(--r-md); height:60px; }
.d-card {
  position:absolute; top:0; left:0; right:0; height:60px;
  display:flex; align-items:center; gap:10px;
  background:var(--surface); border:1px solid var(--border-dim);
  border-left:3px solid var(--border-red); border-radius:var(--r-md);
  padding:8px 12px; backdrop-filter:blur(16px);
  transform:translateX(110%); opacity:0;
  transition:transform .5s var(--ease-spring), opacity .4s var(--ease-out);
}
.d-card.active { transform:translateX(0); opacity:1; }
.d-card.exit   { transform:translateX(-110%); opacity:0; }
.d-card.is-new { border-left-color:var(--gold); }
.d-rank   { font-family:var(--font-display); font-size:12px; color:rgba(255,45,45,.6); min-width:18px; text-align:center; flex-shrink:0; }
.d-card.is-new .d-rank { color:var(--gold); }
.d-avatar {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--red),#ff6b6b);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:11px; color:#fff;
}
.d-card.is-new .d-avatar { background:linear-gradient(135deg,var(--gold),#FF8C00); color:#000; }
.d-info  { flex:1; min-width:0; }
.d-name  { font-size:13px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.d-msg   { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.d-amt   { font-family:var(--font-display); font-size:18px; color:var(--gold); text-shadow:0 0 10px rgba(255,215,0,.4); flex-shrink:0; white-space:nowrap; }

#dots     { display:flex; justify-content:center; gap:5px; margin-top:6px; }
.dot      { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.15); transition:background .3s, transform .3s; }
.dot.on   { background:var(--red); transform:scale(1.3); }
.empty    { font-size:11px; color:rgba(255,255,255,.2); text-align:center; padding:18px 0; }
</style>
</head>
<body>
<div id="panel">
  <div class="panel-header">
    <div class="panel-title">RECENT <span>DONATIONS</span></div>
    <div class="panel-line"></div>
  </div>
  <div id="sliderWindow"><div class="empty">Waiting for donations...</div></div>
  <div id="dots"></div>
</div>
<div class="ws-status" id="wsStatus"></div>

<script>
/* ══════ CONFIG ═════════════ */
const WS_URL   = 'wss://tips-production.up.railway.app/ws';
let MAX_ITEMS  = 5;
let SLIDE_MS   = 3500;
/* ══════════════════════════ */

let donations = [], cur = 0, timer = null, animating = false;
const wsStatus = document.getElementById('wsStatus');

function connect() {
  const ws = new WebSocket(WS_URL);
  ws.onopen    = () => { wsStatus.className = 'ws-status ok'; };
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'donation') push(d);
      if (d.type === 'init')     { if (d.recent && d.recent.length) { d.recent.forEach(r => donations.push({ ...r, isNew:false })); render(); cur=0; goTo(0,true); resetTimer(); } }
      if (d.type === 'settings_update' && d.section === 'recent') {
        if (d.key === 'maxItems') MAX_ITEMS = parseInt(d.value);
        if (d.key === 'slideMs')  { SLIDE_MS  = parseInt(d.value); resetTimer(); }
      }
    } catch(_){}
  };
  ws.onclose = () => { wsStatus.className = 'ws-status err'; setTimeout(connect, 3000); };
  ws.onerror  = () => {};
}
connect();

function push(d) {
  donations.unshift({ ...d, isNew: true });
  if (donations.length > MAX_ITEMS) donations = donations.slice(0, MAX_ITEMS);
  setTimeout(() => { if (donations[0]) donations[0].isNew = false; }, 5000);
  cur = 0; animating = false;
  clearInterval(timer); timer = null;
  render();
  requestAnimationFrame(() => {
    const card = document.getElementById('c0');
    if (card) { card.style.transition='none'; card.style.transform='translateX(0)'; card.style.opacity='1'; void card.offsetWidth; card.style.transition=''; }
    updateDots(); resetTimer();
  });
}

function render() {
  const win = document.getElementById('sliderWindow');
  win.innerHTML = '';
  if (!donations.length) { win.innerHTML = '<div class="empty">Waiting for donations...</div>'; buildDots(); return; }
  donations.forEach((d, i) => {
    const init = d.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
    const el   = document.createElement('div');
    el.className = 'd-card' + (d.isNew ? ' is-new' : ''); el.id = 'c'+i;
    el.style.cssText = 'transform:translateX(110%);opacity:0;transition:none;';
    el.innerHTML = `<div class="d-rank">#${i+1}</div><div class="d-avatar">${init}</div><div class="d-info"><div class="d-name">${d.name}</div>${d.message?`<div class="d-msg">"${d.message}"</div>`:''}</div><div class="d-amt">₹${d.amount}</div>`;
    win.appendChild(el);
  });
  buildDots();
}

function buildDots() {
  const el = document.getElementById('dots'); el.innerHTML = '';
  donations.forEach((_,i) => { const d=document.createElement('div'); d.className='dot'+(i===cur?' on':''); d.id='d'+i; el.appendChild(d); });
}
function updateDots() { document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===cur)); }

function goTo(next, instant) {
  if (animating || !donations.length || next === cur) return;
  animating = true;
  const oldC = document.getElementById('c'+cur);
  const newC = document.getElementById('c'+next);
  if (!newC) { animating=false; return; }
  if (instant) { newC.style.transition='none'; newC.style.transform='translateX(0)'; newC.style.opacity='1'; void newC.offsetWidth; newC.style.transition=''; cur=next; updateDots(); animating=false; return; }
  newC.style.transition = 'none'; newC.style.transform='translateX(110%)'; newC.style.opacity='1'; void newC.offsetWidth;
  newC.style.transition = 'transform .5s var(--ease-spring),opacity .4s'; newC.style.transform='translateX(0)';
  if (oldC) { oldC.style.transition='transform .5s var(--ease-spring),opacity .4s'; oldC.style.transform='translateX(-110%)'; oldC.style.opacity='0'; }
  cur = next; updateDots();
  setTimeout(() => {
    if (oldC) { oldC.style.transition='none'; oldC.style.transform='translateX(110%)'; oldC.style.opacity='0'; }
    animating = false;
  }, 550);
}

function resetTimer() {
  if (timer) clearInterval(timer);
  if (donations.length <= 1) return;
  timer = setInterval(() => goTo((cur+1)%donations.length, false), SLIDE_MS);
}

buildDots();
</script>
</body>
</html>
