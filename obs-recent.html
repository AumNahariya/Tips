<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Recent Donations</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  #recentPanel {
    width: 100%;
    padding: 10px;
    pointer-events: none;
  }

  /* ── Header ── */
  .panel-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.5); white-space: nowrap;
  }
  .panel-title span { color: #FF2D2D; }
  .panel-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(255,45,45,0.4), transparent);
  }

  /* ── Slider window — only 1 card visible at a time ── */
  #sliderWindow {
    position: relative;
    overflow: hidden;
    border-radius: 10px;
    /* Height fits one card — adjust if font size changes */
    height: 58px;
  }

  /* ── Single donation card ── */
  .d-card {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 8px;
    background: rgba(8,8,16,0.85);
    border: 1px solid rgba(255,255,255,0.07);
    border-left: 3px solid rgba(255,45,45,0.6);
    border-radius: 10px;
    padding: 8px 12px;
    backdrop-filter: blur(16px);
    height: 58px;
    /* start off-screen right */
    transform: translateX(110%);
    transition: transform 0.55s cubic-bezier(0.34,1.2,0.64,1), opacity 0.4s;
    opacity: 0;
  }
  .d-card.active {
    transform: translateX(0);
    opacity: 1;
  }
  .d-card.exit-left {
    transform: translateX(-110%);
    opacity: 0;
  }

  /* New donation — gold accent */
  .d-card.is-new { border-left-color: #FFD700; }

  /* Shimmer */
  .d-card::after {
    content: '';
    position: absolute; top:0; left:-60%; width:40%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    animation: shimmer 3s ease-in-out infinite;
    border-radius: 10px;
  }
  @keyframes shimmer { to { left: 120%; } }

  .d-index {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px; color: rgba(255,45,45,0.6);
    min-width: 18px; text-align: center; flex-shrink: 0;
  }
  .d-card.is-new .d-index { color: #FFD700; }

  .d-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #FF2D2D, #ff6b6b);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 11px; color: #fff;
  }
  .d-card.is-new .d-avatar { background: linear-gradient(135deg, #FFD700, #FF8C00); color: #000; }

  .d-info { flex: 1; min-width: 0; }
  .d-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .d-msg {
    font-size: 10px; color: rgba(255,255,255,0.4);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .d-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; color: #FFD700;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
    flex-shrink: 0; white-space: nowrap;
  }

  /* ── Dots indicator ── */
  #dots {
    display: flex; justify-content: center; gap: 5px;
    margin-top: 6px;
  }
  .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active { background: #FF2D2D; transform: scale(1.3); }

  .empty-state {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; color: rgba(255,255,255,0.2);
    text-align: center; padding: 18px 0;
  }
</style>
</head>
<body>
<div id="recentPanel">
  <div class="panel-header">
    <div class="panel-title">RECENT <span>DONATIONS</span></div>
    <div class="panel-line"></div>
  </div>
  <div id="sliderWindow">
    <div class="empty-state">Waiting for donations...</div>
  </div>
  <div id="dots"></div>
</div>

<script>
const proto      = location.protocol === 'https:' ? 'wss:' : 'ws:';
const SERVER_URL = proto + '//' + location.host + '/ws';
const MAX_ITEMS  = 5;       // keep last 5 donations
const SLIDE_MS   = 3500;    // how long each card is shown (ms)

let donations    = [];      // newest first
let currentIdx   = 0;       // which card is active
let slideTimer   = null;
let isAnimating  = false;

/* ── WebSocket ── */
function connect() {
  console.log('[recent] connecting to', SERVER_URL);
  const ws = new WebSocket(SERVER_URL);
  ws.onopen    = () => console.log('[recent] WS connected');
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'donation') addDonation(d);
      if (d.type === 'settings_update' && d.section === 'recent') {
        if (d.key === 'maxItems') MAX_ITEMS = parseInt(d.value);
        if (d.key === 'slideMs')  { SLIDE_MS = parseInt(d.value); resetTimer(); }
        if (d.key === 'accentColor') document.documentElement.style.setProperty('--accent', d.value);
      }
    } catch(err) {}
  };
  ws.onclose = () => { console.log('[recent] reconnecting...'); setTimeout(connect, 3000); };
  ws.onerror = (e) => console.error('[recent] WS error', e);
}
connect();

/* ── Add new donation ── */
function addDonation(data) {
  donations.unshift({ name: data.name, amount: data.amount, message: data.message || '', isNew: true });
  if (donations.length > MAX_ITEMS) donations = donations.slice(0, MAX_ITEMS);
  setTimeout(() => { if (donations[0]) donations[0].isNew = false; }, 4000);

  // Reset index and animating state so buildSlider + show always works
  currentIdx  = 0;
  isAnimating = false;
  if (slideTimer) { clearInterval(slideTimer); slideTimer = null; }

  buildSlider();

  // Activate card-0 directly after a paint frame
  requestAnimationFrame(() => {
    const card = document.getElementById('card-0');
    if (card) {
      card.style.transition = 'none';
      card.style.transform  = 'translateX(0)';
      card.style.opacity    = '1';
      card.classList.add('active');
      void card.offsetWidth;
      card.style.transition = '';
    }
    updateDots();
    resetTimer();
  });
}

/* ── Build slider DOM ── */
function buildSlider() {
  const win = document.getElementById('sliderWindow');
  win.innerHTML = '';
  if (donations.length === 0) {
    win.innerHTML = '<div class="empty-state">Waiting for donations...</div>';
    buildDots(); return;
  }
  donations.forEach((d, i) => {
    const initials = d.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) || '?';
    const card = document.createElement('div');
    card.className = 'd-card' + (d.isNew ? ' is-new' : '');
    card.id = 'card-' + i;
    // ALL cards start off-screen right — goTo() will move them in/out
    card.style.cssText = 'transform:translateX(110%); opacity:0; transition:none;';
    card.innerHTML = `
      <div class="d-index">#${i+1}</div>
      <div class="d-avatar">${initials}</div>
      <div class="d-info">
        <div class="d-name">${d.name}</div>
        ${d.message ? `<div class="d-msg">"${d.message}"</div>` : ''}
      </div>
      <div class="d-amount">₹${d.amount}</div>`;
    win.appendChild(card);
  });
  buildDots();
}

/* ── Dots ── */
function buildDots() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  donations.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentIdx ? ' active' : '');
    dot.id = 'dot-' + i;
    dotsEl.appendChild(dot);
  });
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentIdx);
  });
}

/* ── Slide to index ── */
function goTo(newIdx) {
  if (isAnimating || donations.length === 0) return;
  if (newIdx === currentIdx) return;
  isAnimating = true;

  const oldCard = document.getElementById('card-' + currentIdx);
  const newCard = document.getElementById('card-' + newIdx);
  if (!newCard) { isAnimating = false; return; }

  // Step 1: position new card off-screen right instantly (no transition)
  newCard.style.transition = 'none';
  newCard.style.transform  = 'translateX(110%)';
  newCard.style.opacity    = '1';
  void newCard.offsetWidth; // force reflow

  // Step 2: slide both simultaneously
  newCard.style.transition = 'transform 0.5s cubic-bezier(0.34,1.2,0.64,1), opacity 0.4s';
  newCard.style.transform  = 'translateX(0)';

  if (oldCard) {
    oldCard.style.transition = 'transform 0.5s cubic-bezier(0.34,1.2,0.64,1), opacity 0.4s';
    oldCard.style.transform  = 'translateX(-110%)';
    oldCard.style.opacity    = '0';
  }

  currentIdx = newIdx;
  updateDots();

  setTimeout(() => {
    // Reset old card back off-screen right for next cycle
    if (oldCard) {
      oldCard.style.transition = 'none';
      oldCard.style.transform  = 'translateX(110%)';
      oldCard.style.opacity    = '0';
    }
    isAnimating = false;
  }, 550);
}

/* ── Auto-advance timer ── */
function resetTimer() {
  if (slideTimer) clearInterval(slideTimer);
  if (donations.length <= 1) return;
  slideTimer = setInterval(() => {
    const next = (currentIdx + 1) % donations.length;
    goTo(next);
  }, SLIDE_MS);
}

/* ── Init ── */
buildDots();
</script>
</body>
</html>
